<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Fruit Cocktail</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#001a4d">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --neon-blue:#00d4ff;--neon-pink:#ff2d9e;--neon-yellow:#ffe600;
  --deep-blue:#001233;--mid-blue:#001f5c;--panel-blue:#00134a;
  --gold:#ffcc00;--gold2:#ffaa00;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;touch-action:manipulation;}
body{display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 100% 100% at 50% 0%,#001a5c 0%,#000d2e 60%,#000510 100%);}

.machine{
  position:relative;width:100%;height:100%;
  display:flex;flex-direction:column;
  overflow:hidden;
}
/* Bubbles background */
.machine::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle 120px at 10% 20%,rgba(0,180,255,0.07) 0%,transparent 70%),
    radial-gradient(circle 80px at 80% 10%,rgba(255,50,150,0.06) 0%,transparent 70%),
    radial-gradient(circle 100px at 90% 70%,rgba(0,200,255,0.06) 0%,transparent 70%),
    radial-gradient(circle 60px at 20% 80%,rgba(255,200,0,0.05) 0%,transparent 70%);
  animation:bgPulse 8s ease-in-out infinite;
}
@keyframes bgPulse{0%,100%{opacity:0.8;}50%{opacity:1;}}

/* ===== TITLE BAR ===== */
.title-bar{
  background:linear-gradient(180deg,#001a4d 0%,#000e2e 100%);
  border-bottom:3px solid var(--neon-blue);
  padding:clamp(3px,0.8vh,8px) clamp(6px,2vw,16px);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;z-index:5;
  box-shadow:0 0 20px rgba(0,212,255,0.3),0 3px 10px rgba(0,0,0,0.8);
}
.title-hud{display:flex;gap:clamp(5px,1.2vw,12px);align-items:center;}
.hud-item{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(0,10,40,0.8);
  border:2px solid rgba(0,212,255,0.4);
  border-radius:8px;
  padding:2px 10px;min-width:clamp(50px,9vw,80px);
  box-shadow:0 0 10px rgba(0,212,255,0.2) inset,0 0 15px rgba(0,0,0,0.6);
}
.hud-label{color:#7ab8ff;font-size:clamp(7px,1.1vw,9px);letter-spacing:2px;text-transform:uppercase;font-weight:800;}
.hud-value{
  color:var(--neon-yellow);font-size:clamp(13px,2.4vw,18px);font-weight:900;
  text-shadow:0 0 8px rgba(255,230,0,0.9),0 0 2px #ff8800;
  transition:color 0.2s;
}
.hud-value.pop{animation:hudPop 0.35s ease;}
@keyframes hudPop{0%{transform:scale(1);}40%{transform:scale(1.3);color:#fff;}100%{transform:scale(1);}}

.title-center{
  font-family:'Fredoka One',cursive;
  font-size:clamp(18px,5vw,44px);
  background:linear-gradient(180deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 8px rgba(255,200,0,0.5));
  animation:titleShimmer 3s ease-in-out infinite;
  letter-spacing:2px;
}
@keyframes titleShimmer{
  0%,100%{filter:drop-shadow(0 2px 8px rgba(255,200,0,0.5));}
  50%{filter:drop-shadow(0 2px 20px rgba(255,200,0,0.9)) drop-shadow(0 0 40px rgba(100,255,100,0.3));}
}

/* ===== MAIN ===== */
.main-content{display:flex;flex:1;width:100%;align-items:stretch;overflow:hidden;position:relative;z-index:2;}

/* ===== LINES PANELS ===== */
.lines-panel{
  width:clamp(22px,4vw,42px);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  gap:clamp(2px,0.35vh,4px);padding:3px 2px;
  background:linear-gradient(180deg,#001540,#000d28,#001540);
  border-right:2px solid rgba(0,212,255,0.5);
  flex-shrink:0;z-index:5;
}
.lines-panel.right{border-right:none;border-left:2px solid rgba(0,212,255,0.5);}
.line-num{
  width:clamp(17px,3.2vw,28px);height:clamp(17px,3.2vw,28px);
  border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-size:clamp(8px,1.4vw,11px);font-weight:900;cursor:pointer;
  border:1px solid transparent;transition:all 0.15s;user-select:none;
}
.line-num.active{border-color:currentColor;background:rgba(255,255,255,0.08);text-shadow:0 0 6px currentColor;box-shadow:0 0 6px currentColor inset;}
.line-num.inactive{opacity:0.2;}
.ln-1{color:#ff3333;}.ln-2{color:#ffcc00;}.ln-3{color:#3399ff;}
.ln-4{color:#33ff77;}.ln-5{color:#ff44bb;}.ln-6{color:#00ffff;}
.ln-7{color:#ff9900;}.ln-8{color:#cccccc;}.ln-9{color:#bb66ff;}

/* ===== REELS AREA ===== */
.reels-area{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:clamp(3px,0.6vh,7px) 3px clamp(2px,0.4vh,5px);overflow:hidden;position:relative;
}

.reels-frame{
  position:relative;
  background:linear-gradient(180deg,#001a3a,#000d22,#001a3a);
  border:clamp(3px,0.6vw,7px) solid #0040a0;
  border-radius:8px;
  box-shadow:
    0 0 0 2px #002280,
    0 0 0 4px rgba(0,212,255,0.3),
    0 0 40px rgba(0,100,255,0.3),
    0 0 80px rgba(0,50,150,0.2),
    inset 0 0 30px rgba(0,0,0,0.9);
  width:100%;max-width:740px;overflow:hidden;
}
.reels-frame::after{
  content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent 0%,rgba(100,220,255,0.03) 50%,transparent 100%);
  animation:lightScan 5s ease-in-out infinite;
  pointer-events:none;z-index:50;
}
@keyframes lightScan{0%{left:-50%;}45%{left:120%;}100%{left:120%;}}
.reels-inner{display:flex;position:relative;overflow:hidden;}

/* ===== REEL ===== */
.reel{
  flex:1;display:flex;flex-direction:column;
  background:linear-gradient(90deg,
    rgba(0,10,30,0.7) 0%,rgba(0,15,40,0.2) 20%,
    rgba(0,20,50,0.1) 50%,rgba(0,15,40,0.2) 80%,
    rgba(0,10,30,0.7) 100%),
    linear-gradient(180deg,#000e22,#001428,#000e22);
  overflow:hidden;position:relative;
}
.reel::after{
  content:'';position:absolute;top:0;left:0;right:0;height:35%;
  background:linear-gradient(180deg,rgba(0,180,255,0.03) 0%,transparent 100%);
  z-index:20;pointer-events:none;
}
.reel.spinning .reel-strip{animation:reelSpin 0.1s linear infinite;}
@keyframes reelSpin{0%{transform:translateY(0);}100%{transform:translateY(-33.33%);}}
.reel.spinning{filter:blur(0.6px);}
.reel-blur-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;z-index:25;pointer-events:none;
  background:linear-gradient(180deg,rgba(0,0,0,0.4) 0%,transparent 20%,transparent 80%,rgba(0,0,0,0.4) 100%);
  opacity:0;transition:opacity 0.15s;
}
.reel.spinning .reel-blur-overlay{opacity:1;}
.reel-strip{display:flex;flex-direction:column;will-change:transform;width:100%;}

/* ===== SYMBOL ===== */
.symbol{
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:linear-gradient(180deg,#001428,#000e1e);
  border-bottom:1px solid rgba(0,80,150,0.3);
  position:relative;overflow:hidden;
}
.symbol.win-highlight{animation:winFlash 0.4s ease-in-out infinite alternate;z-index:5;}
@keyframes winFlash{
  from{filter:brightness(1) drop-shadow(0 0 0 transparent);transform:scale(1);}
  to{filter:brightness(2.5) drop-shadow(0 0 15px #ffe600) drop-shadow(0 0 8px #ff6600);transform:scale(1.06);}
}
.symbol.wild-glow{animation:wildPulse 0.5s ease-in-out infinite alternate;z-index:6;}
@keyframes wildPulse{
  from{filter:brightness(1.5) drop-shadow(0 0 8px #ff2d9e);}
  to{filter:brightness(3) drop-shadow(0 0 25px #ff2d9e) drop-shadow(0 0 10px #fff);}
}
.symbol.scatter-glow{animation:scatterPulse 0.6s ease-in-out infinite;z-index:7;}
@keyframes scatterPulse{
  0%,100%{filter:brightness(1.5) drop-shadow(0 0 10px #ffe600);transform:scale(1);}
  50%{filter:brightness(3.5) drop-shadow(0 0 25px #ff6600);transform:scale(1.1) rotate(3deg);}
}

/* ===== WIN OVERLAY ===== */
.win-overlay{
  position:absolute;inset:0;z-index:30;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  pointer-events:auto;
}
.win-overlay.show{display:flex;}
.win-overlay::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 50% at 50% 40%,rgba(0,5,20,0.9),rgba(0,2,10,0.96));
  animation:winBgPulse 1.2s ease-in-out infinite;
}
@keyframes winBgPulse{0%,100%{opacity:0.88;}50%{opacity:1;}}
.win-amount{
  position:relative;z-index:2;
  font-family:'Fredoka One',cursive;
  font-size:clamp(26px,7.5vw,68px);
  background:linear-gradient(180deg,#ffe600,#ff9900);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(255,200,0,0.8));
  animation:winAmountPop 0.5s cubic-bezier(0.2,0.8,0.2,1) both;
  letter-spacing:3px;text-align:center;
}
@keyframes winAmountPop{from{transform:scale(0.3) rotate(-10deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.win-lines-info{
  position:relative;z-index:2;
  font-size:clamp(10px,2vw,15px);
  color:#7ab8ff;letter-spacing:2px;margin-top:8px;text-align:center;font-weight:700;
}
.win-coins-anim{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.coin{
  position:absolute;font-size:clamp(14px,2.5vw,22px);
  animation:coinFall var(--cd,2s) var(--cdelay,0s) ease-in forwards;
}
@keyframes coinFall{
  0%{transform:translate(var(--cx,50vw),-5vh) rotate(0deg);opacity:1;}
  100%{transform:translate(calc(var(--cx,50vw) + var(--csx,0px)),110vh) rotate(var(--crot,360deg));opacity:0;}
}

#paylineCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:15;}

/* ===== SIDE CTRL PANELS ===== */
.side-ctrl-panel{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(4px,0.9vh,9px);
  width:clamp(76px,13vw,110px);
  background:linear-gradient(180deg,#001540,#000d28,#001540);
  padding:8px 4px;z-index:5;flex-shrink:0;
  border-right:2px solid rgba(0,212,255,0.3);
}
.side-ctrl-panel.right-c{border-right:none;border-left:2px solid rgba(0,212,255,0.3);}
body.landscape .side-ctrl-panel{display:flex;}
.side-hud{text-align:center;margin-bottom:4px;}
.side-label{color:#7ab8ff;font-size:clamp(8px,1.3vw,10px);font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.side-val{
  color:var(--neon-yellow);font-size:clamp(14px,2.5vw,18px);font-weight:900;
  background:rgba(0,5,20,0.8);border:1.5px solid rgba(0,212,255,0.4);
  border-radius:5px;padding:2px 12px;min-width:44px;text-align:center;
}
.side-ctrl-row{display:flex;align-items:center;gap:4px;}
.side-arr-btn{
  width:clamp(22px,3.5vw,30px);height:clamp(22px,3.5vw,30px);
  border-radius:4px;background:linear-gradient(180deg,#003080,#001a50);
  border:1.5px solid rgba(0,212,255,0.4);color:var(--neon-blue);font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900;
}
.side-arr-btn:active{transform:scale(0.9);}
.side-max-btn,.side-spin-btn,.side-double-btn,.side-info-btn{
  width:90%;padding:5px 8px;border-radius:6px;font-size:clamp(10px,1.7vw,12px);
  cursor:pointer;font-weight:900;letter-spacing:1px;transition:all 0.1s;
}
.side-max-btn{
  background:linear-gradient(180deg,#004080,#002060);
  border:1.5px solid var(--neon-blue);color:var(--neon-blue);
}
.side-spin-btn{
  background:linear-gradient(180deg,#cc1a00,#7a0a00);
  border:2px solid #ff4400;color:#fff;
  font-size:clamp(13px,2.2vw,16px);padding:8px;
  box-shadow:0 0 15px rgba(255,60,0,0.4);
}
.side-spin-btn:active{transform:scale(0.93);}
.side-spin-btn.spin-waiting{
  background:linear-gradient(180deg,#008800,#004400);
  border-color:#00ff44;color:#fff;
  box-shadow:0 0 15px rgba(0,255,80,0.4);
  animation:spinWait 0.8s ease-in-out infinite alternate;
}
@keyframes spinWait{from{box-shadow:0 0 15px rgba(0,255,80,0.4);}to{box-shadow:0 0 30px rgba(0,255,80,0.8);}}
.side-double-btn{background:linear-gradient(180deg,#7a1a6a,#3a0a30);border:1.5px solid #ff44cc;color:#ff88ee;}
.side-double-btn.active-d{background:linear-gradient(180deg,#cc1ac0,#7a0a70);box-shadow:0 0 12px rgba(255,50,200,0.5);}
.side-double-btn:disabled{opacity:0.4;cursor:default;}
.side-info-btn{background:linear-gradient(180deg,#005080,#002840);border:1.5px solid #0088aa;color:#88ddff;}

/* ===== CONTROLS BAR (portrait) ===== */
.controls-bar{
  display:none;
  background:linear-gradient(180deg,#001540,#000d28);
  border-top:2px solid rgba(0,212,255,0.4);
  padding:clamp(4px,1vh,8px) clamp(8px,2vw,16px);
  flex-shrink:0;z-index:5;
  justify-content:space-around;align-items:center;gap:8px;
  box-shadow:0 -3px 15px rgba(0,0,0,0.8);
}
body.portrait .controls-bar{display:flex;}
.ctrl-group{display:flex;flex-direction:column;align-items:center;gap:3px;}
.ctrl-label{color:#7ab8ff;font-size:clamp(8px,1.5vw,10px);font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.ctrl-val{
  color:var(--neon-yellow);font-size:clamp(14px,3vw,18px);font-weight:900;
  background:rgba(0,5,20,0.8);border:1.5px solid rgba(0,212,255,0.4);
  border-radius:5px;padding:2px 14px;min-width:48px;text-align:center;
}
.ctrl-row{display:flex;align-items:center;gap:5px;}
.arr-btn{
  width:clamp(24px,5vw,32px);height:clamp(24px,5vw,32px);
  border-radius:5px;background:linear-gradient(180deg,#003080,#001a50);
  border:1.5px solid rgba(0,212,255,0.4);color:var(--neon-blue);
  font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900;
}
.arr-btn:active{transform:scale(0.9);}
.spin-btn{
  background:linear-gradient(180deg,#cc1a00,#7a0a00);
  border:2px solid #ff4400;color:#fff;
  font-size:clamp(15px,3.5vw,20px);font-weight:900;
  padding:clamp(8px,1.8vh,14px) clamp(20px,5vw,40px);
  border-radius:8px;cursor:pointer;letter-spacing:1px;
  box-shadow:0 0 18px rgba(255,60,0,0.4);
}
.spin-btn:active{transform:scale(0.93);}
.spin-btn.spin-waiting{
  background:linear-gradient(180deg,#008800,#004400);border-color:#00ff44;
  box-shadow:0 0 18px rgba(0,255,80,0.4);animation:spinWait 0.8s ease-in-out infinite alternate;
}
.max-btn{
  background:linear-gradient(180deg,#004080,#002060);
  border:1.5px solid var(--neon-blue);color:var(--neon-blue);
  font-size:clamp(9px,1.7vw,11px);font-weight:800;padding:3px 10px;
  border-radius:5px;cursor:pointer;
}
.double-btn{
  background:linear-gradient(180deg,#7a1a6a,#3a0a30);border:1.5px solid #ff44cc;color:#ff88ee;
  font-size:clamp(9px,1.7vw,11px);font-weight:800;padding:4px 10px;border-radius:5px;cursor:pointer;
}
.double-btn.active-d{background:linear-gradient(180deg,#cc1ac0,#7a0a70);box-shadow:0 0 10px rgba(255,50,200,0.5);}
.double-btn:disabled{opacity:0.4;cursor:default;}
.info-btn{
  background:linear-gradient(180deg,#004060,#002030);border:1.5px solid #0088aa;color:#88ddff;
  font-size:clamp(9px,1.7vw,11px);font-weight:800;padding:3px 10px;border-radius:5px;cursor:pointer;
}

/* Free spins bar */
#freeSpinsBar{
  display:none;width:100%;max-width:740px;
  background:linear-gradient(180deg,#001a40,#000d28);
  border:1px solid rgba(0,212,255,0.5);border-bottom:none;
  border-radius:6px 6px 0 0;
  padding:4px 12px;text-align:center;
  color:var(--neon-yellow);font-weight:900;font-size:clamp(11px,2.2vw,15px);
  letter-spacing:2px;
  box-shadow:0 0 15px rgba(0,212,255,0.3);
}
#freeSpinsBar.show{display:block;}

/* ===== BONUS INTRO OVERLAY ===== */
#bonusIntroOverlay{
  position:fixed;inset:0;z-index:200;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 80% 70% at 50% 40%,rgba(0,10,40,0.97),rgba(0,2,10,0.99));
  overflow:hidden;
}
#bonusIntroOverlay.show{display:flex;}
.bonus-intro-rays{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(130vw,130vh);height:min(130vw,130vh);
  background:conic-gradient(from 0deg,transparent 0deg,rgba(0,200,255,0.05) 10deg,transparent 20deg,rgba(255,100,0,0.04) 30deg,transparent 40deg,rgba(0,255,150,0.05) 50deg,transparent 70deg,rgba(255,200,0,0.04) 90deg,transparent 100deg,transparent 360deg);
  animation:raysRotate 7s linear infinite;
  pointer-events:none;
}
@keyframes raysRotate{to{transform:translate(-50%,-50%) rotate(360deg);}}
.bonus-intro-icon{
  font-size:clamp(80px,18vw,160px);
  animation:bonusBounce 0.8s cubic-bezier(0.36,0.07,0.19,0.97) 3;
  filter:drop-shadow(0 0 30px rgba(255,50,100,0.8));
  position:relative;z-index:5;margin-bottom:10px;
}
@keyframes bonusBounce{
  0%{transform:scale(0) rotate(-30deg);opacity:0;}
  40%{transform:scale(1.3) rotate(8deg);opacity:1;}
  70%{transform:scale(0.9) rotate(-3deg);}
  100%{transform:scale(1) rotate(0deg);opacity:1;}
}
.bonus-intro-title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(24px,7vw,62px);
  background:linear-gradient(180deg,#ff6b6b,#ffd93d,#6bcb77);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 15px rgba(255,200,0,0.5));
  animation:titleSlideIn 0.7s 0.5s both;
  position:relative;z-index:5;text-align:center;
}
@keyframes titleSlideIn{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.bonus-intro-sub{
  color:#7ab8ff;font-weight:800;font-size:clamp(14px,3vw,22px);letter-spacing:3px;
  animation:titleSlideIn 0.6s 1s both;position:relative;z-index:5;margin-top:8px;
}
.intro-particles{position:absolute;inset:0;pointer-events:none;z-index:3;overflow:hidden;}
.intro-particle{
  position:absolute;border-radius:50%;
  animation:particleFly var(--dur,3s) var(--delay,0s) ease-out infinite;
}
@keyframes particleFly{
  0%{transform:translate(var(--sx,0),var(--sy,0)) scale(0);opacity:0;}
  10%{opacity:1;}
  100%{transform:translate(var(--ex,0),var(--ey,0)) scale(0.3);opacity:0;}
}

/* ===== BONUS PICK GAME ===== */
#bonusPickScreen{
  position:fixed;inset:0;z-index:150;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%,rgba(0,20,60,0.97),rgba(0,5,15,0.99));
  padding:16px;
}
#bonusPickScreen.show{display:flex;}
.bonus-pick-title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(22px,6vw,56px);
  background:linear-gradient(180deg,#ff6b6b,#ffd93d);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 15px rgba(255,200,0,0.6));
  margin-bottom:clamp(8px,2vh,16px);letter-spacing:2px;
}
.bonus-pick-hud{
  display:flex;gap:16px;margin-bottom:clamp(8px,2vh,16px);
}
.bph-item{
  background:rgba(0,10,40,0.9);border:2px solid rgba(0,212,255,0.4);
  border-radius:8px;padding:4px 14px;text-align:center;
}

  notes.forEach((f,i)=>setTimeout(()=>beep(f,0.18,'sine',0.08),i*80));
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
function rnd(pool){return pool[Math.floor(Math.random()*pool.length)];}
function getSym(id){return SYMBOLS.find(s=>s.id===id);}

// ===== LAYOUT =====
function isLandscape(){return window.innerWidth>window.innerHeight;}
function applyLayout(){
  const l=isLandscape();
  document.body.classList.toggle('landscape',l);
  document.body.classList.toggle('portrait',!l);
  const ov=document.getElementById('rotateOverlay');
  if(ov) ov.style.display=l?'none':'flex';
}
function getSymSize(){
  if(isLandscape()){
    const SIDE_W=Math.max(76,Math.min(110,window.innerWidth*0.125));
    const LINE_W=Math.max(22,Math.min(42,window.innerWidth*0.04));
    const avW=window.innerWidth-SIDE_W*2-LINE_W*2-6*(REELS-1);
    const avH=window.innerHeight-4;
    return Math.min(Math.floor(avW/REELS),Math.floor(avH/ROWS));
  } else {
    const topH=Math.max(36,Math.min(60,window.innerHeight*0.08));
    const ctrlH=Math.max(70,Math.min(120,window.innerHeight*0.18));
    const avH=window.innerHeight-topH-ctrlH-16;
    const avW=window.innerWidth-Math.max(22,Math.min(42,window.innerWidth*0.04))*2-6*(REELS-1);
    return Math.min(Math.floor(avW/REELS),Math.floor(avH/ROWS));
  }
}

// ===== EVALUATE =====
function evaluate(lines,bet){
  let totalWin=0;
  const winLines=[];
  const activeLines=PAYLINES.slice(0,lines);
  for(const pl of activeLines){
    const row=pl.rows.map((r,c)=>grid[c][r]);
    const wildId='cocktail';
    const first=row[0]===wildId ? (row.find(s=>s!==wildId)||wildId) : row[0];
    let count=0;
    for(const s of row){
      if(s===first||s===wildId) count++;
      else break;
    }
    if(count>=3){
      const symData=getSym(first);
      const mult=symData.pays[count];
      if(mult){
        const win=mult*bet;
        totalWin+=win;
        winLines.push({line:pl,count,sym:first,win});
      }
    }
  }
  return {totalWin,winLines};
}

function countSymbol(id){
  let n=0;
  for(let c=0;c<REELS;c++) for(let r=0;r<ROWS;r++) if(grid[c][r]===id) n++;
  return n;
}

// ===== SPIN LOGIC =====
async function spin(){
  if(spinning)return;
  clearCanvas();

  const bet=BET_OPTS[betIdx];
  const lines=LINE_OPTS[linesIdx];
  const total=bet*lines;
  if(balance<total){showWinOverlay('НЕТ СРЕДСТВ',[]);return;}

  spinning=true;
  balance-=total;
  lastWin=0;
  setDoubleActive(false);
  updateHUD();
  setSpin(true);
  document.querySelectorAll('.symbol.win-highlight,.symbol.wild-glow,.symbol.scatter-glow').forEach(e=>{
    e.classList.remove('win-highlight','wild-glow','scatter-glow');
  });

  for(let c=0;c<REELS;c++) document.getElementById(`reel-${c}`).classList.add('spinning');

  const newGrid=[];
  for(let c=0;c<REELS;c++){
    newGrid[c]=[];
    for(let r=0;r<ROWS;r++) newGrid[c][r]=rnd(POOL);
  }
  beep(180,0.05,'sawtooth',0.04);

  for(let c=0;c<REELS;c++){
    await delay(200+c*220);
    stopReel(c,newGrid[c]);
    beep(280+c*35,0.09,'square',0.05);
  }
  await delay(300);
  grid=newGrid;

  // Check for BONUS (3+ strawberries anywhere)
  const sbCount=countSymbol('strawberry');
  const {totalWin,winLines}=evaluate(lines,bet);

  spinning=false;
  setSpin(false);

  if(sbCount>=3){
    // Highlight strawberries
    for(let c=0;c<REELS;c++)
      for(let r=0;r<ROWS;r++)
        if(grid[c][r]==='strawberry') document.getElementById(`sym-${c}-${r}`).classList.add('scatter-glow');

    await delay(600);
    showBonusIntro(bet,lines);
    return;
  }

  // Scatter cocktail check (pays anywhere from total bet)
  const cocktailCount=countSymbol('cocktail');
  if(cocktailCount>=2){
    const scatterMults={2:3, 3:15, 4:150, 5:500};
    const sm=scatterMults[Math.min(cocktailCount,5)];
    if(sm){
      const sw=total*sm;
      balance+=sw;lastWin+=sw;
    }
  }

  if(totalWin>0){
    balance+=totalWin;lastWin=totalWin;updateHUD();
    highlightWins(winLines);await delay(350);
    showWinOverlay('+'+lastWin,winLines);
    playWin(lastWin);confetti();setDoubleActive(true);
  } else {
    updateHUD();
  }
  persistBalanceToServer();
}

function clearCanvas(){

function drawPaylines(winLines){
  const svg=document.getElementById('paylineCanvas');
  if(!svg) return;
  svg.innerHTML='';
  const inner=document.getElementById('reelsInner');
  const rect=inner.getBoundingClientRect();
  const svgRect=svg.getBoundingClientRect();
  const sz=getSymSize();
  const sepW=6;
  winLines.forEach(wl=>{
    const pl=wl.line;
    const pts=[];
    for(let c=0;c<REELS;c++){
      const r=pl.rows[c];
      const x=(sz+sepW)*c+sz/2;
      const y=r*sz+sz/2;
      pts.push({x,y});
    }
    const path=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    path.setAttribute('points',pts.map(p=>`${p.x},${p.y}`).join(' '));

    path.setAttribute('fill','none');
    path.setAttribute('opacity','0.85');

    svg.appendChild(path);
  });

// ===== BONUS PICK GAME =====
function startBonusPick(bet,lines){
  bonusBet=bet*lines;
  bonusWinTotal=0;
  bonusPicksDone=0;
  bonusMaxPicks=3;

  // Generate jar values: multipliers of total bet
  const possibleMults=[2,3,5,8,10,15,20,30,0,0,1,1,2,5,10];
  bonusJarValues=[];
  for(let i=0;i<15;i++){
    bonusJarValues.push(possibleMults[Math.floor(Math.random()*possibleMults.length)]);
  }

  document.getElementById('bpBet').textContent=bonusBet;
  document.getElementById('bpWin').textContent=0;
  document.getElementById('bpCredit').textContent=balance.toFixed(0);
  document.getElementById('bonusPickResult').textContent='';
  document.getElementById('bonusCollectBtn').classList.remove('show');

  buildJars();
  document.getElementById('bonusPickScreen').classList.add('show');
  bonusActive=true;
}

function buildJars(){
  const grid=document.getElementById('jarsGrid');
  grid.innerHTML='';
  for(let i=0;i<15;i++){
    const jar=document.createElement('div');
    jar.className='jar';
    jar.id=`jar-${i}`;
    jar.onclick=()=>pickJar(i);
    jar.innerHTML=`<div class="jar-body"></div><div class="jar-label" id="jarlabel-${i}">?</div>`;
    grid.appendChild(jar);
  }
}

async function pickJar(i){
  if(!bonusActive) return;
  const jar=document.getElementById(`jar-${i}`);
  if(!jar||jar.classList.contains('revealed')) return;

  jar.classList.add('revealed');
  const mult=bonusJarValues[i];
  const win=mult*bonusBet;
  const label=document.getElementById(`jarlabel-${i}`);

  if(mult>0){
    bonusWinTotal+=win;
    balance+=win;
    jar.querySelector('.jar-body').innerHTML=`<span style="font-size:clamp(20px,3.5vw,30px)">×${mult}</span>`;
    label.textContent='+'+win;
    beep(660,0.15,'sine',0.08);setTimeout(()=>beep(880,0.2,'sine',0.1),120);
  } else {
    jar.querySelector('.jar-body').innerHTML='<span style="font-size:clamp(24px,4vw,36px)">😞</span>';
    label.textContent='0';
    label.classList.add('empty');
    beep(200,0.2,'sawtooth',0.05);
  }

  document.getElementById('bpWin').textContent=bonusWinTotal;
  document.getElementById('bpCredit').textContent=balance.toFixed(0);

  bonusPicksDone++;
  if(mult===0){
    // Game over - reveal all
    document.getElementById('bonusPickResult').textContent='Увы! Бонус завершён!';
    revealAllJars();
    await delay(800);
    document.getElementById('bonusCollectBtn').classList.add('show');
  } else if(bonusPicksDone>=bonusMaxPicks){
    document.getElementById('bonusPickResult').textContent=`ВЫИГРЫШ: +${bonusWinTotal}!`;
    revealAllJars();
    if(bonusWinTotal>0){confetti();}
    await delay(600);
    document.getElementById('bonusCollectBtn').classList.add('show');
  } else {
    const left=bonusMaxPicks-bonusPicksDone;
    document.getElementById('bonusPickResult').textContent=`+${win} | Осталось выборов: ${left}`;
  }
  updateHUD();
}

function revealAllJars(){
  for(let i=0;i<15;i++){
    const jar=document.getElementById(`jar-${i}`);
    if(!jar||jar.classList.contains('revealed')){continue;}
    jar.classList.add('revealed');
    const mult=bonusJarValues[i];
    const win=mult*bonusBet;
    jar.querySelector('.jar-body').innerHTML=`<span style="font-size:clamp(18px,3vw,28px);opacity:0.5">×${mult}</span>`;
    const label=document.getElementById(`jarlabel-${i}`);
    label.textContent=mult>0?('+'+win):'0';
    if(mult===0) label.classList.add('empty');
  }
}

function endBonusPick(){
  bonusActive=false;
  document.getElementById('bonusPickScreen').classList.remove('show');
  lastWin=bonusWinTotal;
  updateHUD();
  if(bonusWinTotal>0){
    showWinOverlay('БОНУС +'+bonusWinTotal,[]);
    setDoubleActive(true);
  }
}

function buildDoubleCards(){
  const row=document.getElementById('cardsRow');

  const dealerRank=RANKS[Math.floor(Math.random()*RANKS.length)];

function revealDoubleCard(card,dealerRank){

  allCards.forEach(c=>c.onclick=null);
  card.classList.add('revealed');
  const cardRank=parseInt(card.dataset.rank);
  const cardSuit=card.dataset.suit;
  const isRed=SUITS_R.includes(cardSuit);
  card.innerHTML=`<div class="card-rank ${isRed?'suit-red':'suit-black'}">${cardSuit}</div><div class="card-rank ${isRed?'suit-red':'suit-black'}" style="font-size:0.7em">${RANKS[cardRank]}</div>`;

  if(cardRank>dealerRank){

  if(show){
    const rows=document.getElementById('paytableRows');
    rows.innerHTML=SYMBOLS.map(s=>`
      <div class="pt-row">
        <span class="pt-sym">${s.e} ${s.label}</span>
        <span class="pt-pays">${Object.entries(s.pays).map(([k,v])=>`${k}×→${v}`).join(' ')}</span>
      </div>`).join('');
    rows.innerHTML+=`<div class="pt-row" style="font-size:11px;color:#7ab8ff;border-top:1px solid rgba(0,180,255,0.3);padding-top:8px;display:block">
      🍓 3 Клубники = БОНУС (выбери банку с джемом!)<br>
      🍹 Коктейль = Wild + Scatter (платит везде)<br>
      ×2 Удвоение: угадай карту выше дилера!
    </div>`;
  }
  ov.classList.toggle('show',show);
}

// ===== SOUND =====
function toggleSound(){
  soundOn=!soundOn;
  const icons=['soundBtn','soundSide'];
  icons.forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=soundOn?'🔊':'🔇';});
}

// ===== CONFETTI =====
function confetti(){
  const colors=['#ff3333','#ffcc00','#00ff88','#00ccff','#ff44cc','#ff9900','#ff6bff'];
  for(let i=0;i<40;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:${-Math.random()*50}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
      animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
    document.body.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}

// ===== FULLSCREEN =====
function goFullscreen(){
  const el=document.documentElement;
  if(!document.fullscreenElement){el.requestFullscreen&&el.requestFullscreen();}
  else{document.exitFullscreen&&document.exitFullscreen();}
}

async function syncBalanceFromServer(){
  try{
    const r=await fetch('/api/me/balances',{credentials:'same-origin'});
    const d=await r.json();
    if(r.ok&&d.ok&&typeof d.main_balance==='number'&&typeof d.bonus_balance==='number'){
      dbBalances.main=Math.floor(d.main_balance);
      dbBalances.bonus=Math.floor(d.bonus_balance);
      balance=selectedAccount==='main'?dbBalances.main:dbBalances.bonus;
      updateHUD();
    }
  }catch(e){}
}

let _persistBalanceTimer=null;
function persistBalanceToServer(accountSnapshot,balanceSnapshot){
  const account=accountSnapshot||selectedAccount;
  const bal=Number.isFinite(Number(balanceSnapshot))?Number(balanceSnapshot):balance;
  dbBalances[account]=Math.max(0,Math.floor(bal));
  if(_persistBalanceTimer)clearTimeout(_persistBalanceTimer);
  _persistBalanceTimer=setTimeout(async()=>{
    try{
      await fetch('/api/me/set_balance',{
        method:'POST',credentials:'same-origin',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({account,balance:bal})
      });
    }catch(e){}
  },300);
}

function buildAccountSwitch(){
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;top:8px;right:8px;z-index:1200;display:flex;flex-direction:column;gap:4px;background:rgba(0,0,0,0.45);padding:4px;border-radius:8px;border:1px solid rgba(0,212,255,0.35);';
  const mk=(label,acc)=>{
    const b=document.createElement('button');
    b.textContent=label;
    b.style.cssText='padding:4px 8px;border-radius:7px;border:1px solid rgba(0,212,255,0.35);background:rgba(0,0,0,0.35);color:#00d4ff;font-weight:700;font-size:12px;cursor:pointer;';
    b.onclick=()=>{selectedAccount=acc;balance=acc==='main'?dbBalances.main:dbBalances.bonus;updateHUD();[...wrap.querySelectorAll("button")].forEach(x=>x.style.opacity='0.7');b.style.opacity='1';};
    return b;
  };
  const bMain=mk('💰 Осн.','main');
  const bBonus=mk('🎁 Бонус','bonus');
  bMain.style.opacity='0.7';bBonus.style.opacity='1';
  wrap.appendChild(bMain);wrap.appendChild(bBonus);
  document.body.appendChild(wrap);
}

// ===== INIT =====
function init(){
  applyLayout();
  buildReels();
  buildLineNums();
  updateHUD();
  setSpin(false);
  syncBalanceFromServer();
  buildAccountSwitch();
  goFullscreen();
}

window.addEventListener('resize',()=>{applyLayout();buildReels();buildLineNums();});
window.addEventListener('load',init);

// Touch support - spacebar/enter to spin
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter') spin();
});
</script>
</body>
</html>
