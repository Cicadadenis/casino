<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1500"/>
      <stop offset="100%" style="stop-color:#7a3d00"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="300" height="200" fill="url(#bg)"/>
  <circle cx="150" cy="100" r="80" fill="url(#glow)" opacity="0.3"/>
  <text x="150" y="115" font-size="80" text-anchor="middle" filter="url(#shadow)">📖</text>
  <text x="150" y="175" font-family="Georgia,serif" font-size="18" fill="#c9a84c" text-anchor="middle" font-weight="bold">Book of Ra</text>
  <rect x="20" y="20" width="260" height="160" rx="10" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.3"/>
</svg>
