{% extends "base.html" %}
{% block content %}
<h2>Регистрация</h2>
<form method="post" class="card">
  <label>Логин</label>
  <input type="text" name="username" required minlength="3">

  <label>Пароль</label>
  <input type="password" name="password" required minlength="6">

  <button type="submit">Зарегистрироваться</button>
</form>
{% endblock %}
